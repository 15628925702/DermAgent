# DermAgent 训练配置文件

# 全局设置
[global]
project_name = "DermAgent"
version = "1.0.0"

# 学习超参数
[learning]
global_learning_rate = 0.05
weight_decay = 0.001
momentum = 0.9
max_epochs = 50
early_stopping_patience = 10
validation_interval = 5

# 组件特定学习率
controller_learning_rate = 0.08
final_scorer_learning_rate = 0.01
rule_scorer_learning_rate = 0.05
retrieval_scorer_learning_rate = 0.03

# 训练设置
[train]
batch_size = 100
eval_interval = 1
save_interval = 5
data_limit = 1000

# 模型配置
[model]
use_controller = true
use_final_scorer = true
use_retrieval = true
use_specialist = true
use_reflection = true
use_rule_memory = true
enable_rule_compression = true

# 数据设置
[data]
dataset_root = "data/pad_ufes_20"
train_split = "train"
val_split = "val"
test_split = "test"

# 输出设置
[output]
weights_dir = "outputs/weights"
train_runs_dir = "outputs/train_runs"
logs_dir = "outputs/logs"
checkpoints_dir = "outputs/checkpoints"

# 评估设置
[evaluation]
metrics = ["accuracy", "top3_accuracy", "malignant_recall", "confusion_accuracy"]
confidence_thresholds = [0.5, 0.7, 0.9]